services:
  # 1. PostgreSQL Database
  - type: db
    name: keshokwako-db
    databaseName: keshokwako
    user: keshokwako_user
    plan: free # Render Free tier database (expires after 90 days, perfect for testing)

  # 2. Django Backend Web Service
  - type: web
    name: keshokwako-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: keshokwako-db
          property: connectionString
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true # Render will automatically generate a secure random secret key
      - key: ALLOWED_HOSTS
        value: "*" # You can restrict this to your Render domain after deployment
      - key: CORS_ALLOWED_ORIGINS
        value: "http://localhost:3000" # You will add your deployed Vercel URL here
